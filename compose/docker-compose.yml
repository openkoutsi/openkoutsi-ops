# openkoutsi production stack — pulled image deployment.
#
# The VM only PULLS images (built + pushed to GHCR by CI); it never builds.
# A systemd timer runs `okdeploy-pull.sh` which does `docker compose pull && up -d`,
# recreating only services whose image digest changed.
#
# Secrets are delivered as files under /opt/openkoutsi/secrets/<field-name> and
# mounted by Compose at /run/secrets/<field-name>, where pydantic-settings
# (secrets_dir=/run/secrets) reads them. Non-secret config comes from stack.env
# (plain environment) — secret fields are NEVER set as environment variables.

services:
  backend:
    image: ghcr.io/openkoutsi/openkoutsi-backend:latest
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      FILE_STORAGE_PATH: /data/uploads
      FRONTEND_URL: ${FRONTEND_URL}
      API_URL: ${API_URL}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      BRIDGE_URL: ${BRIDGE_URL}
      WAHOO_CLIENT_ID: ${WAHOO_CLIENT_ID}
      WAHOO_BRIDGE_URL: ${WAHOO_BRIDGE_URL}
      # LLM base URL / model / API key are configured on the admin settings page
      # (stored in InstanceSettings) — not seeded here. LLM_ALLOWED_SERVERS is an
      # env-only SSRF guard (not an instance setting), so it stays.
      LLM_ALLOWED_SERVERS: ${LLM_ALLOWED_SERVERS}
    volumes:
      - backend_data:/data
    secrets:
      - secret_key
      - encryption_key
      - strava_client_secret
      - bridge_secret
      - wahoo_client_secret
      - wahoo_bridge_secret
    expose:
      - "8000"

  web:
    image: ghcr.io/openkoutsi/openkoutsi-web:latest
    restart: unless-stopped
    environment:
      # The web image reads API_URL at runtime (not the build-time-baked
      # NEXT_PUBLIC_API_URL), so the client calls the public API instead of
      # falling back to its localhost:8000 default.
      API_URL: ${API_URL}
      # BASE_URL is the web app's OWN public origin. Next.js renders robots.txt
      # and sitemap.xml at request time from it; without it they emit empty,
      # relative URLs (broken sitemap). It equals the site's front-end URL, so
      # reuse FRONTEND_URL rather than introduce a second variable for one value.
      BASE_URL: ${FRONTEND_URL}
    expose:
      - "3000"

  strava_bridge:
    image: ghcr.io/openkoutsi/openkoutsi-strava-bridge:latest
    restart: unless-stopped
    environment:
      DATABASE_PATH: /data/bridge.db
    volumes:
      - strava_bridge_data:/data
    secrets:
      - strava_client_secret
      - bridge_secret
    expose:
      - "8084"

  wahoo_bridge:
    image: ghcr.io/openkoutsi/openkoutsi-wahoo-bridge:latest
    restart: unless-stopped
    environment:
      DATABASE_PATH: /data/bridge.db
    volumes:
      - wahoo_bridge_data:/data
    secrets:
      - wahoo_bridge_secret
      - wahoo_webhook_token
    expose:
      - "8085"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - web
      - strava_bridge
      - wahoo_bridge
      - dozzle
      - netdata
    ports:
      - "80:80"
      - "443:443"
    # The stock nginx image ships /var/log/nginx/{access,error}.log as symlinks
    # to /dev/stdout and /dev/stderr, and Docker copies those symlinks into the
    # (empty) nginx_logs volume on first use.
    #
    #   access.log — goaccess reads it from nginx_logs to build the stats report
    #     and cannot follow a symlink to nginx's own stdout (it would hang on its
    #     own output and never parse a report). Strip that symlink (only if it IS
    #     a symlink, to preserve a real log across restarts) so nginx writes a
    #     real file.
    #   error.log  — keep the stock symlink to /dev/stderr so nginx errors flow to
    #     the container's stderr, where the log-collection stack (Vector's
    #     per-service files + the Dozzle live viewer) captures them like every
    #     other service. Making it a real file here hides errors from both (#23).
    #
    # Reload every 6h so renewed certs from the certbot service are picked up.
    command: >
      sh -c "[ -L /var/log/nginx/access.log ] && rm -f /var/log/nginx/access.log;
      while :; do sleep 6h & wait $${!}; nginx -s reload; done & exec nginx -g 'daemon off;'"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
      - goaccess_report:/usr/share/nginx/html/stats:ro

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renew twice daily; nginx picks up new certs on its own reload schedule.
    entrypoint: >
      sh -c 'trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!}; done'

  goaccess:
    image: allinurl/goaccess:latest
    restart: unless-stopped
    depends_on:
      - nginx
    volumes:
      - nginx_logs:/var/log/nginx:ro
      - goaccess_report:/report
      - ./goaccess/goaccess.conf:/etc/goaccess/goaccess.conf:ro
    # goaccess runs in STATIC mode (no WebSocket — see goaccess.conf), so it
    # processes the log, writes /report/index.html, and exits. Regenerate it on a
    # 30s loop so the report stays current.
    #
    # First wait until nginx has created a REAL access.log:
    #   - missing file  -> goaccess exits fatally ("Unable to open the specified
    #                       log file"), writing no /report/index.html;
    #   - symlink       -> until nginx strips the stock image's access.log ->
    #                       /dev/stdout symlink (see the nginx service), goaccess
    #                       would follow it to its own stdout and hang, again
    #                       producing no report.
    # depends_on only waits for the nginx CONTAINER to start, not for it to have
    # produced that file, so guard here. Either failure leaves the stats dir
    # empty and nginx returns 403 (directory index forbidden). An empty regular
    # log is fine. [ ! -L ] rejects the symlink (its /dev/stdout target may still
    # satisfy -e/-f inside the container).
    entrypoint:
      - /bin/sh
      - -c
      - |
        while [ ! -e /var/log/nginx/access.log ] || [ -L /var/log/nginx/access.log ]; do
          echo "waiting for nginx to create a real /var/log/nginx/access.log..."
          sleep 1
        done
        while :; do
          goaccess --no-global-config --config-file=/etc/goaccess/goaccess.conf
          sleep 30
        done

  # Centralized log collection: tails every container's stdout/stderr via the
  # Docker Engine API and writes per-service, daily-rotated files to the
  # service_logs volume on the VM's OS disk (not the data device). No app changes
  # — the services keep logging to stdout. (nginx's access.log is a real file in
  # nginx_logs for GoAccess, so it never reaches stdout; its error.log is a
  # symlink to stderr, so Vector collects nginx errors like any other service —
  # see vector.yaml.)
  vector:
    image: timberio/vector:0.40.0-alpine
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - service_logs:/logs
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
    command: ["--config", "/etc/vector/vector.yaml"]

  # Real-time browser log viewer for all containers, proxied by nginx at
  # logs.<domain> behind the same basic-auth as the GoAccess dashboard.
  dozzle:
    image: amir20/dozzle:v8.10.6
    restart: unless-stopped
    environment:
      DOZZLE_NO_ANALYTICS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "8080"

  # Lightweight host + container performance monitoring (CPU, memory, disk I/O,
  # network, per-container stats), proxied by nginx at metrics.<domain> behind the
  # same basic-auth as the other dashboards. Reads host metrics through read-only
  # /proc, /sys and the Docker socket; machine-learning and Netdata Cloud are
  # disabled in netdata.conf to keep the footprint small on the single VM. Its
  # metrics DB lives in Docker named volumes (OS disk), NOT the encrypted data
  # device — this is transient, self-retention-managed monitoring data.
  netdata:
    image: netdata/netdata:stable
    restart: unless-stopped
    hostname: openkoutsi
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    environment:
      DO_NOT_TRACK: "1"
    volumes:
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - ./netdata/netdata.conf:/etc/netdata/netdata.conf:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "19999"

# Data volumes bind to the encrypted data device (DATA_MOUNT, /opt/openkoutsi/data);
# log volumes bind to the OS disk (LOG_MOUNT) — see the nginx_logs/service_logs note.
volumes:
  backend_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_MOUNT}/backend
  strava_bridge_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_MOUNT}/strava_bridge
  wahoo_bridge_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_MOUNT}/wahoo_bridge
  letsencrypt:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_MOUNT}/letsencrypt
  certbot_www:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_MOUNT}/certbot_www
  # Logs bind to the VM's OS disk (LOG_MOUNT), NOT the encrypted data device:
  # they are transient, retention-pruned, and excluded from the backed-up volume.
  nginx_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${LOG_MOUNT}/nginx_logs
  service_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${LOG_MOUNT}/service_logs
  goaccess_report:
  # Netdata's metrics DB + cache: plain Docker named volumes on the OS disk (like
  # goaccess_report), kept off the encrypted, backed-up data device — transient,
  # self-pruned monitoring data.
  netdata_lib:
  netdata_cache:

secrets:
  secret_key:
    file: ./secrets/secret_key
  encryption_key:
    file: ./secrets/encryption_key
  strava_client_secret:
    file: ./secrets/strava_client_secret
  bridge_secret:
    file: ./secrets/bridge_secret
  wahoo_client_secret:
    file: ./secrets/wahoo_client_secret
  wahoo_bridge_secret:
    file: ./secrets/wahoo_bridge_secret
  wahoo_webhook_token:
    file: ./secrets/wahoo_webhook_token
