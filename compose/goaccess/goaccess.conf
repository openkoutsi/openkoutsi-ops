# GoAccess configuration for the openkoutsi access-log dashboard.
# Parses nginx's combined log format and serves a real-time HTML report.

log-format COMBINED
log-file /var/log/nginx/access.log

# Real-time HTML report written to the shared volume and pushed over WebSocket.
real-time-html true
output /report/index.html

# The report's browser JS connects back here. nginx proxies wss://${stats_fqdn}/ws
# to the goaccess container on port 7890.
ws-url wss://${stats_fqdn}/ws
port 7890
addr 0.0.0.0

# Keep crawlers in the report — useful for spotting when openkoutsi is being
# hammered by bots/scrapers.
ignore-crawlers false
real-os true
