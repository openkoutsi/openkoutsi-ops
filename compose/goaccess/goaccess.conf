# GoAccess configuration for the openkoutsi access-log dashboard.
# Parses nginx's combined log format and writes a STATIC HTML report.
#
# Real-time (WebSocket) mode is intentionally NOT used. In real-time mode
# goaccess embeds a wss://<host>:<port> URL in the report whose port is forced
# to equal goaccess's own bind port (7890) — the browser dials
# wss://<host>:7890/ws, which is not reachable through nginx (and 7890 must not
# be exposed). Instead the goaccess service regenerates this static report on a
# timer (see docker-compose.yml) and the page auto-reloads via html-refresh
# below. No WebSocket, no extra port, no /ws proxy.

log-format COMBINED
log-file /var/log/nginx/access.log
output /report/index.html

# Auto-reload the report in the browser so new traffic appears without a manual
# refresh (matches the goaccess service's regeneration cadence).
html-refresh 30

# Keep crawlers in the report — useful for spotting when openkoutsi is being
# hammered by bots/scrapers.
ignore-crawlers false
real-os true
