# Minimal Netdata overrides for the single openkoutsi VM. Only the keys below are
# changed; everything else falls back to Netdata's built-in defaults. The goal is a
# small, private footprint suitable for a 2 GB box — enough history to judge whether
# the VM is over- or under-sized, without ML or cloud overhead.
[global]
    # Sample every 2s instead of 1s to cut CPU/IO on the small VM.
    update every = 2

[db]
    # On-disk time-series DB, capped so history stays bounded on the OS disk.
    mode = dbengine
    storage tiers = 1
    dbengine multihost disk space MB = 256

[ml]
    # Anomaly-detection ML is the biggest CPU/RAM consumer — off for right-sizing.
    enabled = no

[cloud]
    # Fully self-hosted: do not connect to Netdata Cloud.
    enabled = no
