# GoAccess access-log dashboard — ${server_name} (basic-auth protected)
server {
    listen 443 ssl;
    http2 on;
    server_name ${server_name};

    ssl_certificate     /etc/letsencrypt/live/${server_name}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${server_name}/privkey.pem;

    auth_basic           "openkoutsi stats";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Static real-time report rendered by the goaccess container.
    location / {
        root  /usr/share/nginx/html/stats;
        index index.html;
    }

    # WebSocket the real-time report uses to push updates.
    location /ws {
        proxy_pass http://goaccess:7890;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }
}
