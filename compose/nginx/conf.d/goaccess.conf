# GoAccess access-log dashboard — ${server_name} (basic-auth protected)
server {
    listen 443 ssl;
    http2 on;
    server_name ${server_name};

    ssl_certificate     /etc/letsencrypt/live/openkoutsi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openkoutsi/privkey.pem;

    auth_basic           "openkoutsi stats";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Static report regenerated on a timer by the goaccess container; it
    # auto-reloads client-side (html-refresh), so there is no WebSocket to proxy.
    location / {
        root  /usr/share/nginx/html/stats;
        index index.html;
    }
}
