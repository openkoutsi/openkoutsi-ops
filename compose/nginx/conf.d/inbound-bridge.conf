# Inbound email bridge — ${server_name} -> inbound_bridge:8086 (public HTTPS for
# provider inbound webhooks). Optional/opt-in service (issue #38): this vhost is
# only rendered (non-empty) when inbound_email_enabled = true.
#
# Unlike the other bridge vhosts, the upstream is resolved lazily via a variable
# + Docker's embedded DNS (127.0.0.11): nginx is NOT allowed to depend_on this
# profiled service (that would force it to start), so a static proxy_pass to an
# absent host would fail nginx config load. With a variable, nginx starts
# regardless and returns 502 until the bridge is up.
server {
    listen 443 ssl;
    http2 on;
    server_name ${server_name};

    ssl_certificate     /etc/letsencrypt/live/openkoutsi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openkoutsi/privkey.pem;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://inbound_bridge:8086;
        proxy_pass $upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
