# Landing page — ${server_name} (static marketing site)
server {
    listen 443 ssl;
    http2 on;
    server_name ${server_name};

    ssl_certificate     /etc/letsencrypt/live/openkoutsi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openkoutsi/privkey.pem;

    # Static site published into the shared landing_html volume by the `landing`
    # container (ghcr.io/openkoutsi/openkoutsi-landing-page) at start-up. nginx
    # only serves the files — mirrors the goaccess report pattern above.
    location / {
        root      /usr/share/nginx/html/landing;
        index     index.html;
        try_files $uri $uri/ =404;
    }
}
