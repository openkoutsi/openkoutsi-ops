# Dozzle live log viewer — ${server_name} (basic-auth protected)
server {
    listen 443 ssl;
    http2 on;
    server_name ${server_name};

    ssl_certificate     /etc/letsencrypt/live/openkoutsi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openkoutsi/privkey.pem;

    auth_basic           "openkoutsi logs";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Dozzle streams container logs over WebSocket, so the proxy must upgrade.
    location / {
        proxy_pass http://dozzle:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
