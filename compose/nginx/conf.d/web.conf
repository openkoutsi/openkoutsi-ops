# Web frontend — ${server_name} -> web:3000
server {
    listen 443 ssl;
    http2 on;
    server_name ${server_name};

    ssl_certificate     /etc/letsencrypt/live/openkoutsi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openkoutsi/privkey.pem;

    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # The app emits absolute redirects using its own listening port (3000),
        # producing Location: https://${server_name}:3000/... . nginx's default
        # proxy_redirect only rewrites the upstream literal (http://web:3000/),
        # so rewrite the port-leaking public-host variants back to the real origin.
        proxy_redirect http://$host:3000/  https://$host/;
        proxy_redirect https://$host:3000/ https://$host/;
    }
}
