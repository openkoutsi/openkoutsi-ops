# Vector — centralized log collection for the openkoutsi stack.
#
# Reads every container's stdout/stderr through the Docker Engine API (the
# mounted /var/run/docker.sock) and writes them as per-service, daily-rotated
# plain-text files onto the service_logs volume (bound to the VM's OS disk at
# ${LOG_MOUNT}/service_logs, not the encrypted data device). Services keep logging
# to stdout — no application changes are required.

# Internal checkpoints/state. Lives on the log volume (dotted dir, so the
# retention prune that targets *.log files leaves it alone).
data_dir: /logs/.vector

sources:
  docker:
    type: docker_logs

transforms:
  # Keep the application containers plus nginx; skip only the rest of the
  # logging/edge stack: vector (avoids ingesting its own output), dozzle,
  # goaccess and certbot. nginx's access.log is a real file persisted via the
  # nginx_logs volume + GoAccess dashboard and never reaches stdout, but its
  # error.log is a symlink to stderr (issue #23), so collecting nginx's output
  # captures those errors without duplicating the access log. Matching is on the
  # compose container name (e.g. "openkoutsi-vector-1"), so we match the service
  # segment between the project prefix and the replica index, tolerating both
  # "-" and "_" naming.
  app_only:
    type: filter
    inputs: [docker]
    condition: '!match(string!(.container_name), r''[-_](vector|dozzle|goaccess|certbot)[-_]'')'

sinks:
  files:
    type: file
    inputs: [app_only]
    # One subdirectory per container, one file per day → natural rotation.
    path: "/logs/{{ container_name }}/%Y-%m-%d.log"
    encoding:
      codec: text
